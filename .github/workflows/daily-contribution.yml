name: Daily Contribution

on:
  schedule:
    - cron: '*/2 * * * *'   # Every day 9:00 AM UTC = 2:30 PM IST
  workflow_dispatch:        # Manual trigger from Actions tab

jobs:
  contribute:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0        # ← prevents shallow clone push issues

      - name: Set git identity
        run: |
          git config --global user.email "${{ secrets.GH_EMAIL }}"
          git config --global user.name "AltamashQureshi"

      - name: Make daily update
        run: |
          DATE=$(date +"%Y-%m-%d %H:%M:%S")
          echo "Daily update: $DATE" >> activity_log.md
          git add activity_log.md
          git commit -m "docs: daily activity log update - $DATE"
          git push origin main   # ← explicitly push to main
